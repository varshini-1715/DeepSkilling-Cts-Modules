<ng-container *ngIf="enrolledIds$ | async as enrolledIds">
  <div class="course-card" [ngClass]="{ 'card--enrolled': enrolledIds.includes(course.id), 'card--full': course.credits >= 4, 'expanded': isExpanded }" [ngStyle]="borderStyle">
    
    <h3>{{ course.name }} ({{ course.code }})</h3>
    <p>ID: {{ course.id }}</p>
    <p>Credits: {{ course.credits | creditLabel }}</p>
    
    <div [ngSwitch]="course.gradeStatus">
      <span *ngSwitchCase="'passed'" class="badge" style="background-color: #dcfce7; color: #166534;">Passed</span>
      <span *ngSwitchCase="'failed'" class="badge" style="background-color: #fee2e2; color: #991b1b;">Failed</span>
      <span *ngSwitchDefault class="badge" style="background-color: #f1f5f9; color: #475569;">Pending</span>
    </div>

    <div class="actions">
      <button (click)='toggleEnrollment($event, enrolledIds.includes(course.id))' [ngClass]="{'btn-secondary': enrolledIds.includes(course.id)}">
        {{ enrolledIds.includes(course.id) ? 'Unenroll' : 'Enroll' }}
      </button>
      <button class="btn-secondary" (click)="toggleDetails($event)">Show Details</button>
    </div>
  </div>
</ng-container>
